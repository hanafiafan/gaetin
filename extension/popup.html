<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Gaetin Scraper</title>
  <style>
    :root { --primary: #10b981; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --muted: #94a3b8; --border: #334155; }
    body { font-family: 'Inter', -apple-system, system-ui, sans-serif; width: 340px; margin: 0; background: var(--bg); color: var(--text); }
    .header { display: flex; align-items: center; gap: 12px; padding: 16px; border-bottom: 1px solid var(--border); background: var(--card); }
    .header img { width: 36px; height: 36px; border-radius: 8px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
    .header h1 { margin: 0; font-size: 16px; font-weight: 600; color: var(--text); }
    .header p { margin: 2px 0 0; font-size: 12px; color: var(--primary); font-weight: 500;}
    .content { padding: 16px; }
    .form-group { margin-bottom: 16px; }
    label { font-size: 11px; font-weight: 600; margin-bottom: 6px; display: block; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
    input { width: 100%; box-sizing: border-box; padding: 10px; background: rgba(0,0,0,0.2); border: 1px solid var(--border); color: white; border-radius: 6px; outline: none; font-size: 13px; transition: border-color 0.2s; }
    input:focus { border-color: var(--primary); }
    .row { display: flex; gap: 12px; }
    .btn { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 14px;}
    .btn:hover:not(:disabled) { background: #059669; }
    .btn:disabled { background: #475569; cursor: not-allowed; opacity: 0.7; }
    .btn-danger { background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.2); }
    .btn-danger:hover:not(:disabled) { background: rgba(239, 68, 68, 0.2); }
    .status-card { margin-top: 16px; padding: 12px; border-radius: 6px; background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.2); display: none; }
    .status-card.active { display: block; }
    .status-card.error { background: rgba(239, 68, 68, 0.1); border-color: rgba(239, 68, 68, 0.2); }
    .status-msg { font-size: 12px; margin-bottom: 8px; font-weight: 500; }
    .progress-bar { width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden; margin-bottom: 4px; }
    .progress-fill { height: 100%; background: var(--primary); width: 0%; transition: width 0.3s ease; }
    .progress-text { font-size: 11px; color: var(--muted); text-align: right; font-variant-numeric: tabular-nums; }
    .footer { text-align: center; margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border); }
    .footer a { color: var(--muted); font-size: 12px; text-decoration: none; transition: 0.2s;}
    .footer a:hover { color: var(--primary); }
  </style>
</head>
<body>
  <div class="header">
    <img src="icon48.png" alt="Gaetin Logo" />
    <div>
      <h1>Gaetin Extractor</h1>
      <p>Google Maps to CRM</p>
    </div>
  </div>
  
  <div class="content">
    <div class="form-group">
      <label>Session Key</label>
      <input type="text" id="jobId" placeholder="jobId:token dari dashboard Gaetin..." autocomplete="off" spellcheck="false" />
    </div>

    <div class="form-group row">
      <div style="flex: 1;">
        <label>Target Maks.</label>
        <input type="number" id="maxLeads" value="100" min="1" max="1000" />
      </div>
      <div style="flex: 1;">
        <label>Jeda (detik)</label>
        <input type="number" id="delaySec" value="2" min="1" max="10" step="0.5" />
      </div>
    </div>
    
    <div style="display: flex; gap: 8px;">
      <button id="startBtn" class="btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
        Mulai Ekstrak
      </button>
      <button id="stopBtn" class="btn btn-danger" style="display: none; flex: 0 0 48px; padding: 0;" title="Hentikan">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect></svg>
      </button>
    </div>

    <div class="status-card" id="statusCard">
      <div class="status-msg" id="statusMsg">Mempersiapkan...</div>
      <div class="progress-bar" id="progressBar" style="display: none;">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div class="progress-text" id="progressText" style="display: none;">0 / 100</div>
    </div>

    <div class="footer">
      <a href="https://gaetin.vercel.app/dashboard/scraper" target="_blank">Buka Dashboard Gaetin &rarr;</a>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
